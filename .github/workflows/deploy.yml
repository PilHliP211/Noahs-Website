name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync shows from Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_RANGE: "'Form Responses 1'!A:K"
          SHOWS_TIME_ZONE: ${{ vars.SHOWS_TIME_ZONE || 'America/Chicago' }}
        run: node scripts/build-shows.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static files
        run: |
          mkdir -p _site
          cp index.html styles.css scripts.js favicon.ico CNAME _site/
          if [ -d assets ]; then cp -R assets _site/assets; fi
          if [ -d data ]; then cp -R data _site/data; fi
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
